# NS3 CI script for MacOS
# Check if everything builds fine under debug, default, and optimized, on MacOS.

.build-macos-base:
  extends: .base-build
  variables:
    MAINTAINERS: '/biljkus|edalm|Gabrielcarvfer|pdbj|sderonne|stavallo|sebastienderonne|tomhenderson|tommypec/i'
  tags:
    - macos
    - nsnam
  before_script:
    - brew update
    - brew upgrade
    - brew install ninja cmake ccache libxml2 eigen git
  rules:
    - if: $RELEASE == "weekly"
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $GITLAB_USER_LOGIN =~ $MAINTAINERS
      when: manual
      allow_failure: true

build-macos-debug:
  extends: .build-macos-base
  stage: build
  variables:
    MODE: debug
    COMPILER: clang++

build-macos-default:
  extends: .build-macos-base
  stage: build
  variables:
    MODE: default
    COMPILER: clang++

build-macos-optimized:
  extends: .build-macos-base
  stage: build
  variables:
    MODE: optimized
    COMPILER: clang++

test-macos-debug:
  extends: .build-macos-base
  stage: test
  dependencies:
    - build-macos-debug
  variables:
    MODE: debug
    COMPILER: clang++

test-macos-default:
  extends: .build-macos-base
  stage: test
  dependencies:
    - build-macos-default
  variables:
    MODE: default
    COMPILER: clang++

test-macos-optimized:
  extends: .build-macos-base
  stage: test
  dependencies:
    - build-macos-optimized
  variables:
    MODE: optimized
    COMPILER: clang++
